name: Update World Cup data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "worldcup-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json."
          else
            git add data.json
            git commit -m "Update scores [skip ci]"
            git push
          fi
