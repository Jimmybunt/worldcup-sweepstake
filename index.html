function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function scoreCell(m) {
  if (m.state === "UP" || m.homeScore == null) {
    return '<div class="score center"><span class="badge-state state-up">Upcoming</span></div>';
  }
  const stateClass = m.state === "LIVE" ? "state-live" : "state-ft";
  const stateLabel = m.state === "LIVE" ? "Live" : "FT";
  return '<div class="score">' + m.homeScore + '<span class="sep">:</span>' + m.awayScore +
    '<div><span class="badge-state ' + stateClass + '">' + stateLabel + '</span></div></div>';
}

function renderToday() {
  views.today.innerHTML = data.matchdays.map(day =>
    '<div class="daygroup"><div class="daylabel">' + esc(day.date) + '</div>' +
    day.matches.map(m =>
      '<div class="match"><div class="team home">' + esc(m.home) + '</div>' +
      scoreCell(m) +
      '<div class="team away">' + esc(m.away) + '</div></div>'
    ).join("") + '</div>'
  ).join("");
}

function renderGroups() {
  views.groups.innerHTML = data.groups.map(g =>
    '<div class="grouphead">Group ' + esc(g.name) + '</div>' +
    '<table><thead><tr><th class="pos"></th><th class="tname">Team</th>' +
    '<th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>' +
    g.teams.map((t, i) =>
      '<tr class="' + (i < 2 ? 'qual' : '') + '">' +
      '<td class="pos">' + (i + 1) + '</td>' +
      '<td class="tname">' + esc(t.team) + '</td>' +
      '<td>' + t.P + '</td><td>' + t.W + '</td><td>' + t.D + '</td><td>' + t.L + '</td>' +
      '<td>' + t.GF + '</td><td>' + t.GA + '</td><td>' + (t.GD > 0 ? '+' + t.GD : t.GD) + '</td>' +
      '<td class="pts">' + t.Pts + '</td></tr>'
    ).join("") + '</tbody></table>'
  ).join("");

// tournament's team names via COUNTRY_ALIAS below.
const SWEEPSTAKE = [
  { staff: "Alex", teams: ["Argentina", "Congo"] },
  { staff: "Austen", teams: ["Australia", "Japan"] },
  { staff: "Chris", teams: ["Egypt", "Uruguay"] },
  { staff: "Danny", teams: ["Brazil", "US"] },
  { staff: "Fiona", teams: ["Algeria", "England"] },
  { staff: "Gabriel", teams: ["Bosnia", "Czech republic"] },
  { staff: "Hazel", teams: ["Morocco", "Netherlands"] },
  { staff: "Hugo", teams: ["Paraguay"] },
  { staff: "Dane", teams: ["Turkey"] },
  { staff: "Imogen", teams: ["Ivory Coast", "Saudi Arabia"] },
  { staff: "James E", teams: ["Germany", "Korea"] },
  { staff: "Jamie", teams: ["Panama", "Switzerland"] },
  { staff: "Jimmy", teams: ["France", "Scotland"] },
  { staff: "Joe", teams: ["Ghana", "Mexico"] },
  { staff: "Jon", teams: ["Canada", "Portugal"] },
  { staff: "Louis", teams: ["Croatia", "Spain"] },
  { staff: "Luke", teams: ["Columbia", "Senegal"] },
  { staff: "Rhys", teams: ["Ecuador", "Sweden"] },
  { staff: "Sam", teams: ["Belgium", "South Africa"] },
  { staff: "Sam 2", teams: ["Austria", "Norway"] }
];
const COUNTRY_ALIAS = {
  "Congo": "DR Congo", "Uraguay": "Uruguay", "US": "USA",
  "Czech republic": "Czechia", "Turkey": "Türkiye", "Korea": "South Korea",
  "Columbia": "Colombia", "Bosnia": "Bosnia and Herzegovina"
};

function teamMap() {
  const m = {};
  data.groups.forEach(g => g.teams.forEach(t => { m[t.team] = t; }));
  return m;
}
function resolveTeam(map, name) {
  const n = String(name).trim();
  return map[COUNTRY_ALIAS[n] || n] || null;
}
function advancingSet() {
  const set = new Set();
  data.groups.forEach(g => { set.add(g.teams[0].team); set.add(g.teams[1].team); });
  data.groups.map(g => g.teams[2])
    .sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team.localeCompare(b.team))
    .slice(0, 8).forEach(t => set.add(t.team));
  return set;
}

function renderSweep() {
  const map = teamMap();
  const advancing = advancingSet();

  const rows = SWEEPSTAKE.map(p => {
    let pts = 0, gd = 0, gf = 0;
    const chips = p.teams.map(name => {
      const t = resolveTeam(map, name);
      if (t) { pts += t.Pts; gd += t.GD; gf += t.GF; }
      const inPlace = t ? advancing.has(t.team) : false;
      return {
        label: COUNTRY_ALIAS[String(name).trim()] || String(name).trim(),
        pts: t ? t.Pts : 0,
        in: inPlace
      };
    });
    return { staff: p.staff, pts, gd, gf, chips };
  }).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.staff.localeCompare(b.staff));

  const banner =
    '<div class="provisional">Ranked by the combined league points of each person\'s teams. ' +
    'No one is knocked out yet: after one round even bottom teams can still qualify. ' +
    'The dots show whether each team is currently in a qualifying place (green) or currently below the line (amber). ' +
    'Heads up: Hugo and Dane show only one team each from the list you sent.</div>';

  const list = rows.map((r, i) => {
    const tag = i === 0 ? '<span class="ltag">Leading</span>' : '';
    const chips = r.chips.map(c =>
      '<span class="chip"><span class="d ' + (c.in ? 'in' : 'out') + '"></span>' +
      esc(c.label) + ' <span class="cp">' + c.pts + 'pt' + (c.pts === 1 ? '' : 's') + '</span></span>'
    ).join("");
    return '<div class="lrow' + (i === 0 ? ' leader' : '') + '">' +
      '<div class="lrank">' + (i + 1) + '</div>' +
      '<div class="lmid"><div class="lname">' + esc(r.staff) + tag + '</div>' +
      '<div class="chips">' + chips + '</div></div>' +
      '<div class="lpts">' + r.pts + '<small>pts</small></div></div>';
  }).join("");

  const legend =
    '<div class="legend"><span><span class="d in"></span>currently qualifying</span>' +
    '<span><span class="d out"></span>currently outside top 2 / best thirds</span></div>';

  views.sweep.innerHTML = banner + list + legend;
}

function renderScorers() {
  views.scorers.innerHTML = data.scorers.map((s, i) =>
    '<div class="scorer"><div class="rank">' + (i + 1) + '</div>' +
    '<div class="nm">' + esc(s.name) + '<div class="ctry">' + esc(s.country) + '</div></div>' +
    '<div class="goals">' + s.goals + '<small> gls</small></div></div>'
  ).join("");
}

function recordStr(t) {
  const gd = t.GD > 0 ? '+' + t.GD : t.GD;
  return t.Pts + ' pts · ' + t.GF + '-' + t.GA + ' · GD ' + gd;
}

function renderQualify() {
  const winners = data.groups.map(g => ({ g: g.name, t: g.teams[0] }));
  const runners = data.groups.map(g => ({ g: g.name, t: g.teams[1] }));

  // overall leader = winner with best GD, then GF
  const leader = winners.slice().sort((a, b) =>
    b.t.GD - a.t.GD || b.t.GF - a.t.GF)[0];

  // third-place race: rank all 12 third-placed teams
  const thirds = data.groups.map(g => ({ g: g.name, t: g.teams[2] }))
    .sort((a, b) =>
      b.t.Pts - a.t.Pts || b.t.GD - a.t.GD || b.t.GF - a.t.GF ||
      a.t.team.localeCompare(b.t.team));

  const callout =
    '<div class="callout"><div class="lbl">Out in front</div>' +
    '<div class="big">' + esc(leader.t.team) + '</div>' +
    '<div class="desc">Top of Group ' + esc(leader.g) + ' and the best goal difference of any group leader so far (' +
    (leader.t.GD > 0 ? '+' + leader.t.GD : leader.t.GD) + '). Twelve teams have the maximum three points after one round; this is who is ahead on the tiebreakers.</div></div>';

  const winnerCards =
    '<div class="qsection-head">Top of each group</div><div class="qgrid">' +
    winners.map(w =>
      '<div class="qcard"><span class="glabel">' + esc(w.g) + '</span>' +
      '<span class="qteam">' + esc(w.t.team) + '</span>' +
      '<span class="qrec">' + recordStr(w.t) + '</span></div>'
    ).join("") + '</div>';

  const runnerCards =
    '<div class="qsection-head">Second place (also automatic)</div><div class="qgrid">' +
    runners.map(r =>
      '<div class="qcard"><span class="glabel">' + esc(r.g) + '</span>' +
      '<span class="qteam">' + esc(r.t.team) + '</span>' +
      '<span class="qrec">' + recordStr(r.t) + '</span></div>'
    ).join("") + '</div>';

  const thirdRows = thirds.map((x, i) =>
    '<tr class="' + (i < 8 ? 'qual' : 'out') + (i === 7 ? ' cut' : '') + '">' +
    '<td class="pos">' + (i + 1) + '</td>' +
    '<td class="tname">' + esc(x.t.team) + ' <span class="qrec">(' + esc(x.g) + ')</span></td>' +
    '<td>' + x.t.P + '</td><td>' + x.t.GF + '</td><td>' + x.t.GA + '</td>' +
    '<td>' + (x.t.GD > 0 ? '+' + x.t.GD : x.t.GD) + '</td>' +
    '<td class="pts">' + x.t.Pts + '</td></tr>'
  ).join("");

  const thirdTable =
    '<div class="qsection-head">Third-place race · best 8 of 12 advance</div>' +
    '<div class="provisional">After one matchday this is barely settled. Note the quirk: teams in Groups K and L have not kicked off yet, so they sit on a neutral 0 goal difference, which currently ranks them above sides that have lost. It will sort itself out over the next two rounds.</div>' +
    '<table><thead><tr><th class="pos"></th><th class="tname">Team (group)</th>' +
    '<th>P</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>' +
    thirdRows + '</tbody></table>' +
    '<div class="cutnote">— red line: top 8 go through, teams below are currently out —</div>';

  views.qualify.innerHTML = callout + winnerCards + runnerCards + thirdTable;
}

function render() {
  renderToday();
  renderGroups();
  renderQualify();
  renderSweep();
  renderScorers();
}

// Load results from data.json, which the GitHub Action refreshes from the live
// feed. If the file is missing or unreachable, fall back to the embedded
// snapshot so the dashboard always renders something.
async function loadData() {
  const btn = document.getElementById('refresh');
  const note = document.getElementById('update-note');
  if (btn) btn.disabled = true;
  if (note) note.innerHTML = "";

  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('status ' + res.status);
    const parsed = await res.json();
    if (!parsed.groups || !parsed.groups.length) throw new Error('empty');
    data = parsed;
    render();
    document.getElementById('status-text').textContent =
      (parsed.asOf ? parsed.asOf + ' · ' : '') + 'refreshed ' + new Date().toLocaleTimeString();
  } catch (e) {
    data = SNAPSHOT;
    render();
    document.getElementById('status-text').textContent = 'Showing saved results (' + SNAPSHOT.asOf + ')';
    if (note) note.innerHTML = '<span class="err-inline">Live file not reachable yet.</span>';
  } finally {
    if (btn) btn.disabled = false;
  }
}

loadData();
</script>
